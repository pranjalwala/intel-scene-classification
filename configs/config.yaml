# ============================================================
# configs/config.yaml
# Central configuration file for the Intel Scene Classification
# project. All scripts read from this file; do not hardcode
# hyperparameters elsewhere.
# ============================================================

# ------------------------------------------------------------
# Reproducibility
# ------------------------------------------------------------
seed: 42

# ------------------------------------------------------------
# Dataset Paths
# ------------------------------------------------------------
data:
  train_dir: "data/seg_train/seg_train"
  test_dir:  "data/seg_test/seg_test"
  pred_dir:  "data/seg_pred/seg_pred"
  class_names:
    - buildings
    - forest
    - glacier
    - mountain
    - sea
    - street
  num_classes: 6

# ------------------------------------------------------------
# Image Preprocessing
# ------------------------------------------------------------
image:
  height: 128
  width:  128
  channels: 3

# ------------------------------------------------------------
# Data Augmentation (training only)
# ------------------------------------------------------------
augmentation:
  horizontal_flip: true
  rotation_factor: 0.08       # ±8% of 2π ≈ ±15 degrees
  zoom_factor: 0.10           # ±10%
  brightness_delta: 0.10
  contrast_lower: 0.80
  contrast_upper: 1.20

# ------------------------------------------------------------
# Model Architecture
# ------------------------------------------------------------
model:
  name: "SceneResNet"
  stem_filters: 32
  residual_filters: [64, 128, 256]
  dropout_residual: 0.30
  dense_units: 256
  dropout_dense: 0.50

# ------------------------------------------------------------
# Training Protocol
# ------------------------------------------------------------
training:
  batch_size: 32
  epochs: 50
  initial_lr: 0.001
  optimizer: "adam"

# Learning Rate Schedule (ReduceLROnPlateau)
lr_schedule:
  monitor: "val_loss"
  factor: 0.5
  patience: 5
  min_lr: 0.000001
  verbose: 1

# Early Stopping
early_stopping:
  monitor: "val_loss"
  patience: 10
  restore_best_weights: true

# ------------------------------------------------------------
# Output Paths
# ------------------------------------------------------------
output:
  checkpoint_dir: "results/checkpoints"
  best_model_path: "results/checkpoints/best_model.keras"
  history_path: "results/training_history.json"
  plots_dir: "results/plots"
  metrics_dir: "results/metrics"
  gradcam_dir: "results/gradcam"
